# Reproducibly builds the headless Linux binary for a tagged release (via
# Dockerfile.repro) and publishes its SHA256, so anyone can compare three
# independently-produced hashes and confirm they match:
#   - this CI run (GitHub's runner),
#   - a user's own `just repro`,
#   - the maintainer's signed SHA256SUMS in the release.
#
# Signing is intentionally NOT done here: the minisign secret key stays offline.
# The maintainer runs `just release && just release-sign` locally and uploads
# SHA256SUMS(.minisig) (see docs/releases.md). This job is the independent
# "the pinned build is reproducible and here's the hash" check.
#
# Dormant until the repo is pushed to GitHub; safe to keep in-tree.
name: release-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the draft GitHub Release on a tag

jobs:
  repro-build-linux:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      # Need the commit object so the build can pin SOURCE_DATE_EPOCH to its time.
      - uses: actions/checkout@v4

      # Build the binary in the pinned container (node + rust images, locked deps,
      # SOURCE_DATE_EPOCH, path remap, normalized dist mtimes). Docker is
      # preinstalled on ubuntu-latest. Produces out/corvin and prints its hash.
      - name: Reproducible build
        run: scripts/repro-build.sh

      - name: Stage + hash
        id: stage
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          out="corvin-headless-${version}-linux-x86_64"
          cp out/corvin "$out"
          sha256sum "$out" | tee SHA256SUMS
          {
            echo "sha<<EOF"
            cat SHA256SUMS
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Reproducible build: \`$out\`"
            echo '```'
            cat SHA256SUMS
            echo '```'
            echo "Reproduce it yourself with \`just repro\` and compare, then check"
            echo "both against the signed \`SHA256SUMS\` in the release."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: corvin-linux-x86_64
          path: |
            corvin-*-linux-x86_64
            SHA256SUMS

      # On a tag, open a DRAFT release with the reproducible binary + the CI hash in
      # the body. Signing stays offline: the maintainer uploads the signed
      # SHA256SUMS/.minisig + desktop installers + minisign.pub, then publishes.
      - name: Draft release (maintainer finalizes + publishes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: corvin-*-linux-x86_64
          body: |
            > **Draft** — finalized by the maintainer with offline-signed artifacts. Do not publish as-is.

            Independent reproducible-build hash from CI (compare against the signed `SHA256SUMS`):

            ```
            ${{ steps.stage.outputs.sha }}
            ```

            **To finalize:** run `just release && just release-desktop && just release-sign`
            locally, then upload `release/*` (signed `SHA256SUMS` + `SHA256SUMS.minisig` +
            the `.deb`/`.rpm`) and `minisign.pub` here, paste the matching
            `docs/release-notes-*.md`, and publish. See `docs/releases.md`.
