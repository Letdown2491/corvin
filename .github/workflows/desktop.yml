# Build the desktop app bundles on Linux, macOS, and Windows. Runs on a v* tag and on
# manual dispatch. Bundles are uploaded as workflow artifacts (not auto-attached to the
# release): they are NOT signed/notarized yet (paid certs are a separate, deferred step),
# so macOS/Windows users will see an OS warning. Download them from the run to test, or
# fold them into the signed release set locally.
name: desktop-build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: deb,rpm          # AppImage skipped (needs FUSE; see docs/releases.md)
          - os: macos-latest          # Apple Silicon (arm64). Add macos-13 for Intel.
            bundles: app,dmg
          - os: windows-latest
            bundles: nsis             # not msi: MSI rejects non-numeric prerelease versions (rc.2)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show              # installs the toolchain pinned in rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Linux system deps (Tauri / webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev libudev-dev pkg-config
      # The server crate embeds frontend/dist via rust_embed, so build it before bundling.
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2
      - name: Bundle
        run: cd crates/desktop && tauri build --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: corvin-desktop-${{ matrix.os }}
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.msi
            target/release/bundle/**/*-setup.exe
          if-no-files-found: error
